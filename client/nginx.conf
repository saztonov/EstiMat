# nginx внутри контейнера estimat-web: раздаёт собранный React SPA.
# TLS-термирование, HTTP→HTTPS и HSTS выполняет edge-nginx (deploy/infra/nginx).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Ассеты с контент-хэшем — долгий кэш.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA-fallback: любой маршрут отдаёт index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
  }
}
