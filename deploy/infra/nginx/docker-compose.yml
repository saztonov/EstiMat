# Инфраструктурный ingress: nginx reverse proxy + certbot (§3, §19, §23).
# Отдельный compose-проект, обновляется независимо от порталов:
#   docker compose -p nginx up -d
#
# Сеть edge — общая с порталом (docker network create edge).
# Сертификаты Let's Encrypt и ACME-challenge лежат в ./certbot (см. deploy/README.md).

services:
  nginx:
    image: nginx:alpine
    container_name: infra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks: [edge]

  certbot:
    image: certbot/certbot
    container_name: infra-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Автопродление каждые 12 часов (webroot). nginx нужно перечитать конфиг
    # после обновления сертификатов (см. README — reload по расписанию).
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  edge:
    external: true
