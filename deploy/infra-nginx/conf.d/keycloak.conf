# Вклад Keycloak в общий ingress (§3, §9). Копируется в /opt/infra/nginx/conf.d/keycloak.conf,
# после чего nginx -s reload. Обновляется ОТДЕЛЬНО от порталов (deploy-estimat его не трогает).
#
# Сертификат (один SAN на auth.su10.ru + auth-admin.su10.ru) выпускается через webroot ДО
# добавления 443-блоков, иначе nginx не перечитает конфиг (ссылка на несуществующий cert).
#
#   certbot certonly --webroot -w /var/www/certbot -d auth.su10.ru -d auth-admin.su10.ru
#
# Upstream — контейнер keycloak:8080 в сети edge (наружу порт не публикуется).
# Замените <VPN_OR_OFFICE_CIDR> на реальные доверенные сети для админ-консоли.

# --- HTTP: ACME challenge + редирект на HTTPS ---
server {
    listen 80;
    server_name auth.su10.ru auth-admin.su10.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: ПУБЛИЧНЫЙ домен auth.su10.ru (login/logout, OIDC discovery, JWKS) ---
server {
    listen 443 ssl;
    http2 on;
    server_name auth.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/auth.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.su10.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Defense-in-depth: админ-консоль и master realm недоступны через ПУБЛИЧНЫЙ домен.
    # Полноценно админка обслуживается только на auth-admin.su10.ru (ниже, под allowlist).
    location ~* ^/(admin|realms/master) {
        return 404;
    }

    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}

# --- HTTPS: АДМИНИСТРАТИВНЫЙ домен auth-admin.su10.ru (только VPN/IP allowlist, §3/§9) ---
server {
    listen 443 ssl;
    http2 on;
    server_name auth-admin.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/auth.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.su10.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Доступ к админке — только из доверенных сетей (VPN/офис). Остальным — отказ.
    allow <VPN_OR_OFFICE_CIDR>;
    deny all;

    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
