# Дефолтный сервер общего ingress. Обслуживает ACME-challenge для ВСЕХ доменов
# (выпуск/продление сертификатов любого портала через webroot при работающем nginx)
# и закрывает соединения с неизвестным Host, чтобы случайный портал не отвечал на чужой домен.
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 444;
    }
}
