# EstiMat — portal compose project (§4, §19).
# Запуск из корня репозитория на VPS:
#   docker compose -f deploy/docker-compose.prod.yml -p estimat up -d estimat-api estimat-web
#
# БД — внешний Yandex Managed PostgreSQL (в этом compose НЕТ postgres).
# Образы собираются на VPS (этап 1). Сеть edge — общая с инфраструктурным nginx,
# создаётся один раз: docker network create edge
#
# VITE_API_URL для сборки фронта берётся из окружения оболочки, напр.:
#   export VITE_API_URL=https://api.estimat.example

services:
  estimat-api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: estimat-api:latest
    restart: unless-stopped
    env_file: ../.env.production
    networks: [edge]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  estimat-web:
    build:
      context: ..
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    image: estimat-web:latest
    restart: unless-stopped
    networks: [edge]

  # Разовый накат миграций отдельным шагом (§8):
  #   docker compose -f deploy/docker-compose.prod.yml -p estimat run --rm migrate
  migrate:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: estimat-api:latest
    profiles: ["migrate"]
    env_file: ../.env.production
    networks: [edge]
    command: ["node", "dist/db/migrate.js"]

networks:
  edge:
    external: true
