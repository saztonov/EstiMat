# Вклад портала EstiMat в общий ingress (§3). Копируется в /opt/infra/nginx/conf.d/estimat.conf,
# после чего nginx -s reload. Замените app.estimat.example / api.estimat.example на реальные домены.
# Сертификат (один на оба домена, SAN) выпускается через webroot ДО добавления этого файла —
# иначе 443-блоки сошлются на несуществующие сертификаты и nginx не перечитает конфиг.

# --- HTTP: ACME challenge + редирект на HTTPS (для своих доменов) ---
server {
    listen 80;
    server_name app.estimat.example api.estimat.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: фронтенд (SPA) ---
server {
    listen 443 ssl;
    http2 on;
    server_name app.estimat.example;

    ssl_certificate     /etc/letsencrypt/live/app.estimat.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.estimat.example/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        proxy_pass http://estimat-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# --- HTTPS: backend API ---
server {
    listen 443 ssl;
    http2 on;
    server_name api.estimat.example;

    ssl_certificate     /etc/letsencrypt/live/app.estimat.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.estimat.example/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # ≥ лимита загрузок 10 МБ (multipart) + явные таймауты (§3).
    client_max_body_size 12m;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    location / {
        proxy_pass http://estimat-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}
