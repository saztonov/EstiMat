services:
  postgres:
    image: postgres:17
    container_name: estimat-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: estimat
      POSTGRES_USER: estimat
      POSTGRES_PASSWORD: estimat_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
